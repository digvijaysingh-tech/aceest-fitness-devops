services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: aceest-jenkins-with-docker:lts-jdk21
    container_name: aceest-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    restart: unless-stopped

volumes:
  jenkins_home:
