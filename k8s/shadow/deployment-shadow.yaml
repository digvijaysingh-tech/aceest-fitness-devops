apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  labels:
    app: aceest-fitness
    role: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      role: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        role: shadow
    spec:
      containers:
        - name: aceest-fitness
          image: dshekhawat06640/aceest-fitness:3.2.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
